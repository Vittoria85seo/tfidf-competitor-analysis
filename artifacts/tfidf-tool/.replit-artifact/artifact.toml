kind = "web"
previewPath = "/"
title = "TF-IDF Competitor Analysis"
version = "1.0.0"
id = "artifacts/tfidf-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace && streamlit run app.py --server.port 5000"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "requirements.txt"]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && streamlit run app.py --server.port=5000 --server.address=0.0.0.0"]

[services.production.health.startup]
path = "/"

[services.env]
PORT = "5000"
